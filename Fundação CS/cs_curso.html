/* ─────────── ENGINE ─────────── */
let slides=[], cur=0;
function buildSlides(){
  modules.forEach((mod,mi)=>{
    mod.slides.forEach((sl,si)=>{
      slides.push({modId:mod.id,modLabel:mod.label,mi,si,total:mod.slides.length,...sl});
    });
  });
}
function buildSidebar(){
  const nav=document.getElementById('sb-nav');
  modules.forEach((mod,mi)=>{
    const sec=document.createElement('div');
    sec.className='sb-section';
    const lbl=document.createElement('div');
    lbl.className='sb-section-label';
    lbl.textContent=String(mi+1).padStart(2,'0')+' — '+mod.label;
    sec.appendChild(lbl);
    mod.slides.forEach((sl,si)=>{
      const idx=slides.findIndex(s=>s.modId===mod.id&&s.si===si);
      const btn=document.createElement('button');
      btn.className='sb-btn';
      btn.id='sbtn-'+mod.id+'-'+si;
      btn.innerHTML=sl.title+'<span class="num">'+String(si+1).padStart(2,'0')+'</span>';
      btn.onclick=()=>goTo(idx);
      sec.appendChild(btn);
    });
    nav.appendChild(sec);
  });
}
function goTo(i){
  if(i<0||i>=slides.length)return;
  cur=i;
  const s=slides[cur];
  // update topbar
  document.getElementById('tb-title').textContent=s.modLabel+' — '+s.title;
  document.getElementById('tb-count').textContent=(cur+1)+'/'+slides.length;
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===slides.length-1;
  document.getElementById('prog-fill').style.width=Math.round((cur+1)/slides.length*100)+'%';
  // sidebar active
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  const ab=document.getElementById('sbtn-'+s.modId+'-'+s.si);
  if(ab){ab.classList.add('active');ab.scrollIntoView({block:'nearest'});}
  // content
  const c=document.getElementById('content');
  c.innerHTML='<div class="slide active">'+s.html+nav_footer()+'</div>';
  c.scrollTop=0;
  // init sort if present
  if(document.getElementById('sBars'))sInit();
}
function nav_footer(){
  return '<div class="nav-foot">'+(cur>0?'<button class="nf-btn" onclick="prev()">← anterior</button>':'<span></span>')+(cur<slides.length-1?'<button class="nf-btn" onclick="next()">próximo →</button>':'<span></span>')+'</div>';
}
function prev(){goTo(cur-1);}
function next(){goTo(cur+1);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});

/* ─────────── SORT VIZ ─────────── */
let sArr=[],sSteps=[],sStepIdx=0,sAlgo='';
function sInit(){sArr=[6,3,8,1,9,2,7,4,5];sSteps=[];sStepIdx=0;sAlgo='';sRender(sArr,[],[]);const i=document.getElementById('sInfo');if(i)i.textContent='escolha um algoritmo acima';}
function sRender(arr,cmp,done){
  const el=document.getElementById('sBars');if(!el)return;
  const mx=Math.max(...arr);
  el.innerHTML=arr.map((v,i)=>{
    let c='sb ';
    if(done.includes(i))c+='sb-done';
    else if(cmp.length&&cmp[0]===i&&cmp.length>1)c+='sb-piv';
    else if(cmp.includes(i))c+='sb-cmp';
    else c+='sb-def';
    return '<div class="'+c+'" style="height:'+Math.round(v/mx*86)+'px">'+v+'</div>';
  }).join('');
}
function setSAlgo(a){
  sAlgo=a;sArr=[6,3,8,1,9,2,7,4,5];sSteps=[];sStepIdx=0;
  if(a==='bubble')sBubble([...sArr]);
  if(a==='merge')sMerge([...sArr]);
  if(a==='quick')sQuick([...sArr],0,sArr.length-1);
  sRender(sArr,[],[]);
  const i=document.getElementById('sInfo');if(i)i.textContent=a+' — '+sSteps.length+' passos. pressione ▶';
}
function sStep(){
  if(!sAlgo){const i=document.getElementById('sInfo');if(i)i.textContent='escolha um algoritmo primeiro';return;}
  if(sStepIdx>=sSteps.length){sRender(sArr,[],sArr.map((_,i)=>i));const i=document.getElementById('sInfo');if(i)i.textContent='ordenação completa!';return;}
  const s=sSteps[sStepIdx++];sRender(s.arr,s.cmp||[],s.done||[]);
  const i=document.getElementById('sInfo');if(i)i.textContent='['+sStepIdx+'/'+sSteps.length+'] '+s.info;
}
function sReset(){sInit();}
function sBubble(arr){const n=arr.length;for(let i=0;i<n-1;i++){for(let j=0;j<n-1-i;j++){sSteps.push({arr:[...arr],cmp:[j,j+1],done:[...Array(i).keys()].map(k=>n-1-k),info:'comparando '+arr[j]+' e '+arr[j+1]});if(arr[j]>arr[j+1]){[arr[j],arr[j+1]]=[arr[j+1],arr[j]];sSteps.push({arr:[...arr],cmp:[j,j+1],done:[...Array(i).keys()].map(k=>n-1-k),info:'trocou '+arr[j+1]+' ↔ '+arr[j]});}}sSteps.push({arr:[...arr],cmp:[],done:[...Array(i+1).keys()].map(k=>n-1-k),info:arr[n-1-i]+' chegou ao lugar final'});}}
function sMerge(arr){function mg(a,l,m,r){const L=a.slice(l,m+1),R=a.slice(m+1,r+1);let i=0,j=0,k=l;while(i<L.length&&j<R.length){sSteps.push({arr:[...a],cmp:[l+i,m+1+j],done:[],info:'merge: '+L[i]+' vs '+R[j]});if(L[i]<=R[j])a[k++]=L[i++];else a[k++]=R[j++];}while(i<L.length)a[k++]=L[i++];while(j<R.length)a[k++]=R[j++];sSteps.push({arr:[...a],cmp:[],done:[],info:'subarray ['+l+'..'+r+'] mergeado'});}function ms(a,l,r){if(l>=r)return;const m=Math.floor((l+r)/2);ms(a,l,m);ms(a,m+1,r);mg(a,l,m,r);}const a=[...arr];ms(a,0,a.length-1);}
function sQuick(arr,lo,hi){if(lo>=hi)return;const pv=arr[hi];let i=lo-1;sSteps.push({arr:[...arr],cmp:[hi],done:[],info:'pivot = '+pv});for(let j=lo;j<hi;j++){sSteps.push({arr:[...arr],cmp:[j,hi],done:[],info:arr[j]+'<='+pv+'?'});if(arr[j]<=pv){i++;[arr[i],arr[j]]=[arr[j],arr[i]];sSteps.push({arr:[...arr],cmp:[i,j],done:[],info:'trocou '+arr[j]+' e '+arr[i]});}}[arr[i+1],arr[hi]]=[arr[hi],arr[i+1]];const pi=i+1;sSteps.push({arr:[...arr],cmp:[],done:[pi],info:'pivot '+arr[pi]+' na posição certa'});sQuick(arr,lo,pi-1);sQuick(arr,pi+1,hi);}

/* ─── INIT ─── */
buildSlides();
buildSidebar();
goTo(0);
</script>
