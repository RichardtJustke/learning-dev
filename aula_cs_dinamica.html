<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Fundamentos — Aula Dinâmica</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;
  --bg2:#141417;
  --bg3:#1c1c20;
  --bg4:#242428;
  --accent:#7c6bfa;
  --accent2:#e06afe;
  --green:#4ade80;
  --yellow:#fbbf24;
  --red:#f87171;
  --orange:#fb923c;
  --cyan:#22d3ee;
  --text:#f0eeff;
  --text2:#9b97b8;
  --text3:#5e5a78;
  --border:rgba(124,107,250,0.15);
  --border2:rgba(255,255,255,0.06);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::selection{background:var(--accent);color:white}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* LAYOUT */
.shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.main{margin-left:240px;flex:1;padding:2.5rem 2rem;max-width:900px}
.brand{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid var(--border2)}
.brand h1{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.3px}
.brand h1 span{color:var(--accent)}
.brand p{font-size:11px;color:var(--text3);margin-top:3px}
.progress-wrap{padding:.75rem 1.25rem;border-bottom:1px solid var(--border2)}
.progress-label{font-size:10px;color:var(--text3);margin-bottom:6px;display:flex;justify-content:space-between}
.prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease}
.nav{flex:1;overflow-y:auto;padding:.75rem 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 1.25rem;cursor:pointer;transition:all .15s;border-left:2px solid transparent;font-size:13px;color:var(--text2)}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--text);border-left-color:var(--accent);background:rgba(124,107,250,.08)}
.nav-item .nav-icon{font-size:14px;min-width:18px;text-align:center}
.nav-item .nav-check{margin-left:auto;color:var(--green);font-size:11px;opacity:0;transition:opacity .2s}
.nav-item.done .nav-check{opacity:1}

/* SECTIONS */
.section{display:none;animation:fadeIn .25s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-header{margin-bottom:2rem}
.section-header h2{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1.2}
.section-header h2 span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.section-header p{font-size:14px;color:var(--text2);margin-top:.5rem;line-height:1.6}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:.75rem}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;font-family:'JetBrains Mono',monospace}
.chip-v{border-color:rgba(124,107,250,.4);color:var(--accent);background:rgba(124,107,250,.1)}
.chip-g{border-color:rgba(74,222,128,.4);color:var(--green);background:rgba(74,222,128,.1)}
.chip-y{border-color:rgba(251,191,36,.4);color:var(--yellow);background:rgba(251,191,36,.1)}
.chip-r{border-color:rgba(248,113,113,.4);color:var(--red);background:rgba(248,113,113,.1)}
.chip-c{border-color:rgba(34,211,238,.4);color:var(--cyan);background:rgba(34,211,238,.1)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:1.25rem}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-bottom:1.5rem}
.card h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:.5rem}
.card p{font-size:13px;color:var(--text2);line-height:1.7}
.card.highlight{border-color:rgba(124,107,250,.3);background:rgba(124,107,250,.05)}

/* ANALOGIA BOX */
.analogy{background:linear-gradient(135deg,rgba(124,107,250,.12),rgba(224,106,254,.08));border:1px solid rgba(124,107,250,.25);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.analogy-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem}
.analogy p{font-size:14px;line-height:1.7;color:var(--text)}
.analogy strong{color:var(--accent2)}

/* CODE */
pre{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:1.25rem;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8;overflow-x:auto;margin:1rem 0;position:relative}
.code-label{position:absolute;top:.6rem;right:.75rem;font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.c-kw{color:#c792ea}.c-fn{color:#82aaff}.c-str{color:#c3e88d}.c-num{color:#f78c6c}.c-cmt{color:var(--text3);font-style:italic}.c-var{color:#89ddff}.c-op{color:var(--accent2)}
.c-good{color:var(--green)}.c-bad{color:var(--red)}

/* HIGHLIGHT BOX */
.hbox{border-radius:10px;padding:1rem 1.25rem;margin:1rem 0;font-size:13px;line-height:1.7}
.hbox.info{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);color:var(--cyan)}
.hbox.warn{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--yellow)}
.hbox.success{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--green)}
.hbox.danger{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red)}
.hbox strong{display:block;font-weight:600;margin-bottom:.25rem}

/* STEP EXPLAINER */
.steps{counter-reset:step;margin:1rem 0}
.step{display:flex;gap:1rem;margin-bottom:1rem;align-items:flex-start}
.step-num{width:28px;height:28px;min-width:28px;border-radius:50%;background:rgba(124,107,250,.2);border:1px solid rgba(124,107,250,.4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);font-family:'Syne',sans-serif}
.step-body{flex:1}
.step-body strong{display:block;font-size:13px;font-weight:600;margin-bottom:3px}
.step-body p{font-size:13px;color:var(--text2);line-height:1.6}

/* COMPLEXITY TABLE */
.cplx-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.cplx-row:last-child{border-bottom:none}
.cplx-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 10px;border-radius:6px;min-width:90px;text-align:center;font-weight:600}
.cplx-bar-wrap{flex:1;position:relative}
.cplx-bar{height:6px;border-radius:3px;transition:width .8s ease}
.cplx-desc{font-size:11px;color:var(--text3);min-width:160px;text-align:right}

/* INTERACTIVE VISUALIZER */
.viz-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.viz-card h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:.75rem}
.sort-bars{display:flex;align-items:flex-end;gap:5px;height:100px;padding:8px 0;margin:1rem 0;background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--border2)}
.sbar{border-radius:4px 4px 0 0;transition:height .25s ease,background .2s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:28px;flex:1}
.sbar.idle{background:rgba(124,107,250,.35);color:var(--accent)}
.sbar.comparing{background:rgba(251,191,36,.5);color:var(--yellow)}
.sbar.pivot{background:rgba(224,106,254,.5);color:var(--accent2)}
.sbar.sorted{background:rgba(74,222,128,.4);color:var(--green)}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.5rem}
.btn{padding:7px 14px;font-size:12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,107,250,.08)}
.btn.primary{background:rgba(124,107,250,.2);border-color:rgba(124,107,250,.4);color:var(--accent)}
.step-info{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;min-height:20px;padding:6px 0}

/* MEMORY VIZ */
.mem-diagram{display:flex;flex-direction:column;gap:3px;margin:1rem 0;font-family:'JetBrains Mono',monospace;font-size:11px}
.mem-row{display:flex;align-items:center;gap:8px}
.mem-addr{color:var(--text3);min-width:70px}
.mem-cell{flex:1;padding:5px 10px;border-radius:4px;border:1px solid var(--border2)}
.mem-cell.stack-cell{background:rgba(34,211,238,.1);border-color:rgba(34,211,238,.2);color:var(--cyan)}
.mem-cell.heap-cell{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.2);color:var(--yellow)}
.mem-cell.empty{background:var(--bg3);color:var(--text3)}
.mem-label{width:60px;font-size:10px;text-align:right;padding:2px 6px;border-radius:4px;font-weight:700}
.mem-label.sl{background:rgba(34,211,238,.15);color:var(--cyan)}
.mem-label.hl{background:rgba(251,191,36,.15);color:var(--yellow)}

/* NETWORK VIZ */
.net-flow{display:flex;align-items:center;gap:0;margin:1.5rem 0;overflow-x:auto;padding-bottom:8px}
.net-node{text-align:center;min-width:80px}
.net-box{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:11px;font-weight:600}
.net-arrow{flex:1;min-width:40px;text-align:center;font-size:18px;color:var(--text3);position:relative;padding:0 4px}
.net-arrow span{font-size:9px;display:block;color:var(--accent);font-family:'JetBrains Mono',monospace}
.net-node small{display:block;font-size:10px;color:var(--text3);margin-top:4px}

/* DS VIZ */
.ds-viz{margin:1rem 0}
.ds-array{display:flex;gap:3px;align-items:stretch}
.ds-cell{border:1px solid rgba(124,107,250,.3);background:rgba(124,107,250,.1);border-radius:4px;padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);text-align:center;min-width:42px}
.ds-cell.highlight{border-color:var(--accent2);background:rgba(224,106,254,.2);color:var(--accent2)}
.ds-cell.found{border-color:var(--green);background:rgba(74,222,128,.2);color:var(--green)}
.ds-idx{font-size:9px;color:var(--text3);text-align:center;margin-top:2px;font-family:'JetBrains Mono',monospace}
.idx-row{display:flex;gap:3px}
.idx-cell{min-width:42px;font-size:9px;color:var(--text3);text-align:center;font-family:'JetBrains Mono',monospace}
.ds-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:.75rem}

/* QUIZ / EXERCICIO */
.exercise{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.ex-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
.ex-q{font-size:15px;font-weight:600;margin-bottom:1rem;line-height:1.5;font-family:'Syne',sans-serif}
.ex-opts{display:flex;flex-direction:column;gap:.5rem}
.ex-opt{padding:10px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;text-align:left;font-size:13px;transition:all .15s;font-family:'DM Sans',sans-serif}
.ex-opt:hover{border-color:var(--accent);color:var(--text);background:rgba(124,107,250,.08)}
.ex-opt.correct{border-color:var(--green);background:rgba(74,222,128,.1);color:var(--green)}
.ex-opt.wrong{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
.ex-feedback{font-size:13px;margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;display:none;line-height:1.6}
.ex-feedback.show{display:block}
.ex-feedback.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--green)}
.ex-feedback.ko{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red)}

/* CODE CHALLENGE */
.challenge{background:var(--bg2);border:1px solid rgba(34,211,238,.2);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.challenge-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);margin-bottom:.75rem}
.challenge h4{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:.5rem}
.challenge p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1rem}
.code-editor{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:1rem;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);resize:vertical;min-height:120px;outline:none;line-height:1.7;transition:border-color .15s}
.code-editor:focus{border-color:var(--accent)}
.challenge-btns{display:flex;gap:8px;margin-top:.75rem}
.run-btn{padding:8px 18px;background:rgba(34,211,238,.15);border:1px solid rgba(34,211,238,.3);color:var(--cyan);border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s}
.run-btn:hover{background:rgba(34,211,238,.25)}
.hint-btn{padding:8px 14px;background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s}
.hint-btn:hover{color:var(--text);border-color:var(--border)}
.code-output{margin-top:.75rem;padding:.75rem 1rem;background:var(--bg3);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:12px;min-height:40px;display:none;border:1px solid var(--border2)}
.code-output.show{display:block}
.output-ok{color:var(--green)}.output-err{color:var(--red)}.output-hint{color:var(--yellow)}

/* FOOTER NAV */
.footer-nav{display:flex;justify-content:space-between;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border2)}
.footer-nav button{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s}
.footer-nav button:hover{border-color:var(--accent);color:var(--accent)}
.footer-nav button.next-btn{background:rgba(124,107,250,.15);border-color:rgba(124,107,250,.3);color:var(--accent)}

/* COMPLETION SCREEN */
.completion{text-align:center;padding:3rem 1rem}
.completion h2{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;margin-bottom:.5rem}
.completion p{color:var(--text2);font-size:15px;margin-bottom:2rem}
.score-ring{width:120px;height:120px;border-radius:50%;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;background:rgba(124,107,250,.1)}

/* RESPONSIVE */
@media(max-width:700px){
  .sidebar{display:none}
  .main{margin-left:0;padding:1.5rem 1rem}
  .card-grid{grid-template-columns:1fr}
  .mobile-nav{display:flex!important}
}
.mobile-nav{display:none;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.mobile-nav button{padding:5px 12px;font-size:11px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer}
.mobile-nav button.active{border-color:var(--accent);color:var(--accent)}

/* DIVIDER */
.divider{height:1px;background:var(--border2);margin:1.5rem 0}
.section-subtitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin:1.5rem 0 .75rem;color:var(--text)}
.section-subtitle::before{content:'▸ ';color:var(--accent)}
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand">
    <h1>CS <span>Fundamentos</span></h1>
    <p>Aula Dinâmica — v2</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>Progresso</span><span id="progPct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <nav class="nav" id="sideNav"></nav>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="mobile-nav" id="mobileNav"></div>
  <div id="sections"></div>
</main>

</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────

const sections = [
  { id:'fs', icon:'📁', label:'Sistema de Arquivos' },
  { id:'proc', icon:'⚙️', label:'Processos & Threads' },
  { id:'mem', icon:'🧠', label:'Memória' },
  { id:'net', icon:'🌐', label:'Rede' },
  { id:'ds', icon:'🗂️', label:'Estruturas de Dados' },
  { id:'sort', icon:'🔀', label:'Ordenação' },
  { id:'bigo', icon:'📈', label:'Complexidade' },
  { id:'quiz', icon:'🎯', label:'Atividades' },
];

const done = new Set();
let current = 0;

// ─── SECTION CONTENTS ──────────────────────────────────────────────────────

const contents = {};

// ═══════════ 1. SISTEMA DE ARQUIVOS ═══════════
contents.fs = `
<div class="section-header">
  <h2>📁 <span>Sistema de Arquivos</span></h2>
  <p>Como o Linux organiza arquivos, permissões e links — explicado como se você fosse uma criança de 10 anos.</p>
  <div class="tag-row">
    <span class="chip chip-v">inode</span>
    <span class="chip chip-v">permissões</span>
    <span class="chip chip-v">hard link</span>
    <span class="chip chip-v">symlink</span>
  </div>
</div>

<div class="section-subtitle">O que é um inode?</div>
<div class="analogy">
  <div class="analogy-label">🧸 Analogia</div>
  <p>Imagine uma biblioteca. Cada livro tem uma <strong>ficha na gaveta</strong> (o inode) com o nome do autor, número de páginas, onde o livro está guardado na prateleira. O <strong>nome do livro na capa</strong> é diferente da ficha — você pode ter dois nomes apontando pro mesmo livro (hard link)!</p>
</div>
<div class="card-grid">
  <div class="card">
    <h3>O que o inode guarda?</h3>
    <p>• Dono e grupo do arquivo<br>• Permissões (quem pode ler/escrever/executar)<br>• Tamanho em bytes<br>• Data de criação, modificação, acesso<br>• Ponteiros para os blocos reais de dados no disco<br><br>⚠️ O <strong>nome</strong> do arquivo fica no diretório, não no inode!</p>
  </div>
  <div class="card">
    <h3>Permissões rwx</h3>
    <p>Três grupos: <strong>dono | grupo | outros</strong><br><br>
    r = leitura = 4<br>
    w = escrita = 2<br>
    x = execução = 1<br><br>
    <code style="color:var(--green)">chmod 755</code> = <code>rwxr-xr-x</code><br>
    dono: 7 = 4+2+1 = tudo<br>
    grupo: 5 = 4+0+1 = lê e executa<br>
    outros: 5 = igual ao grupo</p>
  </div>
</div>

<div class="section-subtitle">Hard link vs Symlink</div>
<div class="analogy">
  <div class="analogy-label">🧸 Analogia</div>
  <p><strong>Hard link</strong> = dois apelidos para a <strong>mesma pessoa</strong>. "João" e "Joãozinho" são o mesmo cara. Se João morrer, Joãozinho ainda existe!<br><br>
  <strong>Symlink</strong> = um <strong>bilhete de papel</strong> que diz "olha no armário B". Se o armário B sumir, o bilhete fica inútil (link quebrado).</p>
</div>
<div class="card-grid">
  <div class="card">
    <h3>Hard Link</h3>
    <p>• Dois nomes → mesmo inode<br>• Deletar um nome não apaga os dados<br>• Não funciona entre partições diferentes<br>• Não funciona para diretórios</p>
  </div>
  <div class="card">
    <h3>Symlink (Soft Link)</h3>
    <p>• Um arquivo que aponta para outro caminho<br>• Se o original some → link quebrado<br>• Funciona entre partições<br>• Funciona para diretórios<br>• Como um atalho do Windows</p>
  </div>
</div>

<pre><span class="c-cmt"># Ver o número do inode de um arquivo</span>
ls -li arquivo.txt
<span class="c-cmt"># Saída: 1234567 -rw-r--r-- 1 user group 42 arquivo.txt</span>
<span class="c-cmt">#        ^ inode                    ^permissões</span>

<div class="section-header">
  <h2>⚙️ <span>Processos & Threads</span></h2>
  <p>Como o sistema operacional organiza e executa programas ao mesmo tempo.</p>
  <div class="tag-row">

    <span class="chip chip-v">context switch</span>

<div class="section-subtitle">Processo vs Thread</div>
<div class="analogy">
  <div class="analogy-label">🧸 Analogia</div>
  <p>Imagine um <strong>restaurante</strong>. Um <strong>processo</strong> é como um restaurante inteiro — tem sua própria cozinha, estoque, caixa (memória separada). Uma <strong>thread</strong> é como um <strong>cozinheiro dentro do restaurante</strong> — compartilha a cozinha com outros cozinheiros, mas cada um faz algo diferente ao mesmo tempo.</p>
</div>
<div class="card-grid">
  <div class="card">
    <h3>Processo</h3>
    <p>• Tem seu próprio espaço de memória<br>• Tem um PID único<br>• Se um processo trava, não afeta outros<br>• Criar é mais pesado (fork)<br>• Comunicação entre processos é mais complexa (IPC)</p>
  </div>
  <div class="card">
    <h3>Thread</h3>
    <p>• Vive dentro de um processo<br>• Compartilha memória com outras threads<br>• Criar é mais leve que um processo<br>• Se uma thread trava, pode travar o processo inteiro<br>• Comunicação é simples (memória compartilhada)</p>
  </div>
</div>

<div class="section-subtitle">O que é um PID?</div>
<div class="analogy">
  <div class="analogy-label">🧸 Analogia</div>
  <p>PID é o <strong>CPF do processo</strong>. Todo processo no Linux tem um número único. O <strong>PID 1</strong> é o pai de todos — o processo init/systemd que inicia quando o sistema liga.</p>
</div>

<div class="section-subtitle">Context Switch — Como a CPU "finge" ser múltipla</div>
<div class="analogy">
  <div class="analogy-label">🧸 Analogia</div>
  <p>Imagine um professor <strong>respondendo perguntas</strong> de 30 alunos ao mesmo tempo. Ele não é mágico — ele olha pra um aluno por alguns milissegundos, <strong>salva onde estava</strong> na explicação, olha pro próximo, salva, e vai rodando. Isso é o scheduler do SO fazendo context switch. Tão rápido que parece simultâneo!</p>
</div>

<div class="section-subtitle">Sinais — Comunicação entre processos</div>
<div class="card-grid">
  <div class="card">
    <h3>Sinais principais</h3>
    <p><strong>SIGTERM</strong> — "Por favor, pare" (processo pode ignorar)<br>
    <strong>SIGKILL</strong> — "PARE AGORA" (não pode ignorar, sem cleanup)<br>
    <strong>SIGINT</strong> — Ctrl+C no terminal<br>
    <strong>SIGHUP</strong> — Recarregar configuração (nginx, apache)</p>
  </div>
  <div class="card">
    <h3>O que o fork() faz?</h3>
    <p>Cria um processo filho que é uma cópia quase idêntica do pai. Ambos continuam rodando da linha do fork. O pai recebe o PID do filho, o filho recebe 0. É assim que shells criam novos processos!</p>
  </div>
</div>

<pre><span class="c-cmt"># Ver todos os processos com detalhes</span>
<span class="c-fn">ps</span> aux

<span class="c-cmt"># Ver PID do processo atual (seu terminal bash)</span>
<span class="c-fn">echo</span> <span class="c-var">$$</span>

<span class="c-cmt"># Matar processo gentilmente (pode cleanup)</span>
<span class="c-fn">kill</span> -SIGTERM <span class="c-num">1234</span>

<span class="c-cmt"># Forçar kill — não tem como ignorar</span>
<span class="c-fn">kill</span> -<span class="c-num">9</span> <span class="c-num">1234</span>

<span class="c-cmt"># Fork em C — criando processo filho</span>
<span class="c-kw">pid_t</span> pid = <span class="c-fn">fork</span>();
<span class="c-kw">if</span> (pid == <span class="c-num">0</span>) {
  <span class="c-cmt">// Este código roda no FILHO</span>
  <span class="c-fn">printf</span>(<span class="c-str">"Sou o filho, meu PID: %d\n"</span>, <span class="c-fn">getpid</span>());
} <span class="c-kw">else</span> {
  <span class="c-cmt">// Este código roda no PAI</span>
  <span class="c-fn">printf</span>(<span class="c-str">"Sou o pai, filho tem PID: %d\n"</span>, pid);
}

<span class="c-cmt"># Thread em Python</span>
<span class="c-kw">import</span> threading

<span class="c-kw">def</span> <span class="c-fn">minha_thread</span>():
    <span class="c-fn">print</span>(<span class="c-str">"Rodando em paralelo!"</span>)

t = threading.<span class="c-fn">Thread</span>(target=minha_thread)
t.<span class="c-fn">start</span>()
t.<span class="c-fn">join</span>()  <span class="c-cmt"># Espera terminar</span></pre>

<div class="hbox warn"><strong>⚠️ Cuidado com threads!</strong> Quando duas threads modificam a mesma variável ao mesmo tempo sem controle, acontece uma <strong>race condition</strong> — resultados imprevisíveis. Use locks (mutex) para proteger dados compartilhados.</div>

<div class="exercise" id="ex-proc-2">

<div class="section-header">
  <h2>🧠 <span>Memória</span></h2>

<div class="section-subtitle">Stack vs Heap</div>
<div class="analogy">
  <div class="analogy-label">🧸 Analogia</div>
  <p><strong>Stack</strong> é como uma <strong>mesa de trabalho</strong>. Você coloca coisas em cima, usa, e quando termina empilha de volta. Organizado, rápido, mas espaço limitado.<br><br>
  <strong>Heap</strong> é como um <strong>depósito grande</strong>. Você pode guardar objetos enormes, mas precisa <strong>você mesmo</strong> lembrar de buscar e devolver. Se esquecer de devolver → memory leak!</p>
</div>

<div style="margin:1.5rem 0">
<div style="display:flex;gap:12px;margin-bottom:.5rem">
  <span style="color:var(--cyan);font-size:12px;font-weight:700">■ STACK</span>
  <span style="color:var(--yellow);font-size:12px;font-weight:700">■ HEAP</span>
  <span style="color:var(--text3);font-size:12px">■ Livre</span>
</div>
<div class="mem-diagram">
  <div class="mem-row"><span class="mem-addr">0x0010</span><div class="mem-cell stack-cell">main() — frame</div><span class="mem-label sl">STACK</span></div>
  <div class="mem-row"><span class="mem-addr">0x0020</span><div class="mem-cell stack-cell">fn() — x=5, y=10</div><span class="mem-label sl">STACK</span></div>
  <div class="mem-row"><span class="mem-addr">0x0030</span><div class="mem-cell empty">— livre —</div><span class="mem-label" style="color:var(--text3)">FREE</span></div>
  <div class="mem-row"><span class="mem-addr">0x0050</span><div class="mem-cell heap-cell">objeto alocado (malloc)</div><span class="mem-label hl">HEAP</span></div>
  <div class="mem-row"><span class="mem-addr">0x0070</span><div class="mem-cell heap-cell">array[100] alocado</div><span class="mem-label hl">HEAP</span></div>
  <div class="mem-row"><span class="mem-addr">0x0090</span><div class="mem-cell empty">— livre —</div><span class="mem-label" style="color:var(--text3)">FREE</span></div>
</div>
</div>

<div class="card-grid">
  <div class="card">
    <h3>Stack</h3>
    <p>• Gerenciado automaticamente (LIFO)<br>• Variáveis locais e parâmetros de funções<br>• Muito rápido — só move um ponteiro<br>• Tamanho fixo (~8MB por padrão)<br>• Stack overflow = recursão infinita</p>
  </div>
  <div class="card">
    <h3>Heap</h3>
    <p>• Alocação manual (malloc/free, new/delete)<br>• Tamanho flexível em runtime<br>• Mais lento — precisa gerenciar fragmentação<br>• Esqueceu de liberar = memory leak<br>• Linguagens modernas têm GC pra isso</p>
  </div>
</div>

<div class="section-subtitle">O que é um Ponteiro?</div>
<div class="analogy">
  <div class="analogy-label">🧸 Analogia</div>
  <p>Um ponteiro é um <strong>endereço de uma casa</strong>. Em vez de carregar a casa inteira, você guarda o número da rua. Quando precisa da casa, vai lá buscar (<strong>derreferência</strong>).</p>
</div>

<pre><span class="c-cmt">// C — o básico dos ponteiros</span>
<span class="c-kw">int</span> x = <span class="c-num">42</span>;          <span class="c-cmt">// variável na stack, valor 42</span>
<span class="c-kw">int</span> *ptr = <span class="c-op">&</span>x;      <span class="c-cmt">// ptr guarda o ENDEREÇO de x</span>

<span class="c-fn">printf</span>(<span class="c-str">"%d"</span>, x);      <span class="c-cmt">// imprime 42</span>
<span class="c-fn">printf</span>(<span class="c-str">"%p"</span>, ptr);    <span class="c-cmt">// imprime endereço ex: 0x7ffd1234</span>
<span class="c-fn">printf</span>(<span class="c-str">"%d"</span>, <span class="c-op">*</span>ptr);   <span class="c-cmt">// derreferência → imprime 42</span>

<span class="c-op">*</span>ptr = <span class="c-num">100</span>;          <span class="c-cmt">// muda o valor DE x via ponteiro!</span>
<span class="c-fn">printf</span>(<span class="c-str">"%d"</span>, x);      <span class="c-cmt">// agora imprime 100</span>

<span class="c-cmt">// Heap — alocação manual</span>
<span class="c-kw">int</span> *arr = (<span class="c-kw">int</span>*) <span class="c-fn">malloc</span>(<span class="c-num">10</span> * <span class="c-kw">sizeof</span>(<span class="c-kw">int</span>));
arr[<span class="c-num">0</span>] = <span class="c-num">1</span>;
arr[<span class="c-num">1</span>] = <span class="c-num">2</span>;
<span class="c-fn">free</span>(arr);  <span class="c-cmt">// OBRIGATÓRIO — senão memory leak!</span>

<span class="c-cmt">// Python — sem ponteiros explícitos (GC cuida)</span>
lista = [<span class="c-num">1</span>, <span class="c-num">2</span>, <span class="c-num">3</span>]      <span class="c-cmt"># heap, GC libera quando não tem referência</span>
copia = lista           <span class="c-cmt"># copia é ALIAS — mesmo objeto!</span>
copia.<span class="c-fn">append</span>(<span class="c-num">4</span>)         <span class="c-cmt"># lista também muda!</span>

<span class="c-cmt">// Rust — ownership (sem GC, sem leak)</span>
<span class="c-kw">let</span> s1 = <span class="c-fn">String::from</span>(<span class="c-str">"hello"</span>);
<span class="c-kw">let</span> s2 = s1;            <span class="c-cmt">// s1 "morre" — Rust transfere ownership</span>
<span class="c-cmt">// println!("{}", s1); // ERRO de compilação!</span></pre>

<div class="hbox danger"><strong>🚨 Memory Leak</strong> Acontece quando você aloca memória na heap mas esquece de liberar. Em programas longos, o consumo de RAM vai crescendo até travar. JavaScript, Python, Go e Java têm Garbage Collector (GC) que resolve isso. C e C++ não têm — você é responsável.</div>

<div class="section-subtitle">Como identificar a complexidade no código?</div>

<pre><span class="c-cmt">// O(1) — não tem loop, acesso direto</span>
<span class="c-kw">function</span> <span class="c-fn">primeiro</span>(arr) { <span class="c-kw">return</span> arr[<span class="c-num">0</span>]; }

<span class="c-cmt">// O(n) — um loop que percorre tudo</span>
<span class="c-kw">function</span> <span class="c-fn">soma</span>(arr) {
  <span class="c-kw">let</span> total = <span class="c-num">0</span>;
  <span class="c-kw">for</span> (<span class="c-kw">let</span> i = <span class="c-num">0</span>; i &lt; arr.length; i++) total += arr[i];
  <span class="c-kw">return</span> total;
}

<span class="c-cmt">// O(n²) — loop dentro de loop</span>
<span class="c-kw">function</span> <span class="c-fn">todosParesIguais</span>(arr) {
  <span class="c-kw">for</span> (<span class="c-kw">let</span> i = <span class="c-num">0</span>; i &lt; arr.length; i++) {      <span class="c-cmt">// n</span>
    <span class="c-kw">for</span> (<span class="c-kw">let</span> j = <span class="c-num">0</span>; j &lt; arr.length; j++) {    <span class="c-cmt">// n</span>
      <span class="c-kw">if</span> (arr[i] === arr[j] && i !== j) <span class="c-fn">console.log</span>(arr[i]);
    }
  }
}  <span class="c-cmt">// total: n × n = n²</span>

<span class="c-cmt">// O(log n) — divide ao meio a cada passo</span>
<span class="c-kw">function</span> <span class="c-fn">buscaBinaria</span>(arr, alvo) {
  <span class="c-kw">let</span> l = <span class="c-num">0</span>, r = arr.length - <span class="c-num">1</span>;
  <span class="c-kw">while</span> (l &lt;= r) {
    <span class="c-kw">const</span> m = Math.<span class="c-fn">floor</span>((l + r) / <span class="c-num">2</span>);
    <span class="c-kw">if</span> (arr[m] === alvo) <span class="c-kw">return</span> m;
    <span class="c-kw">if</span> (arr[m] &lt; alvo) l = m + <span class="c-num">1</span>;  <span class="c-cmt">// joga fora metade esquerda</span>
    <span class="c-kw">else</span> r = m - <span class="c-num">1</span>;               <span class="c-cmt">// joga fora metade direita</span>
  }
  <span class="c-kw">return</span> -<span class="c-num">1</span>;
}

<span class="c-cmt">// Big O ignora constantes e termos menores!</span>
<span class="c-cmt">// O(2n + 5) → O(n)</span>
<span class="c-cmt">// O(n² + n) → O(n²)</span>
<span class="c-cmt">// O(3)      → O(1)</span></pre>

<div class="hbox info"><strong>💡 Regras práticas para identificar</strong><br>
• Loop simples → O(n)<br>
• Loop dentro de loop → O(n²)<br>
• Divide ao meio a cada passo → O(log n)<br>
• Loop que divide ao meio → O(n log n)<br>
• Todas as combinações possíveis → O(2ⁿ)</div>

let sortArr=[], sortSteps=[], sortStep=0, currentAlgo='', autoInterval=null;

function initSortViz() {
  sortArr=[5,3,8,1,9,2,7,4,6];
  sortSteps=[];sortStep=0;currentAlgo='';
  renderBars(sortArr,[],[],[]);
  document.getElementById('stepInfo').textContent='Escolha um algoritmo e clique em "Próximo passo".';
}

function renderBars(arr,comparing,sorted,pivots) {
  const el=document.getElementById('sortBars'); if(!el)return;
  const max=Math.max(...arr);
  el.innerHTML=arr.map((v,i)=>{
    let cls='sbar idle';
    if(sorted.includes(i)) cls='sbar sorted';
    else if(pivots&&pivots.includes(i)) cls='sbar pivot';
    else if(comparing.includes(i)) cls='sbar comparing';
    return `<div class="${cls}" style="height:${Math.round(v/max*76)}px">${v}</div>`;
  }).join('');
}

function setAlgo(algo) {
  clearInterval(autoInterval);
  currentAlgo=algo;
  sortArr=[5,3,8,1,9,2,7,4,6];
  sortSteps=[];sortStep=0;
  if(algo==='bubble') genBubble([...sortArr]);
  if(algo==='merge') genMerge([...sortArr]);
  if(algo==='quick') genQuick([...sortArr],0,sortArr.length-1);
  renderBars(sortArr,[],[],[]);
  document.getElementById('stepInfo').textContent=algo+' — '+sortSteps.length+' passos. Clique em "Próximo passo".';
}

function stepViz() {
  if(!currentAlgo){document.getElementById('stepInfo').textContent='Escolha um algoritmo primeiro.';return;}
  if(sortStep>=sortSteps.length){document.getElementById('stepInfo').textContent='✅ Ordenação completa!';renderBars(sortArr,[],sortArr.map((_,i)=>i),[]);return;}
  const s=sortSteps[sortStep++];
  renderBars(s.arr,s.cmp||[],s.srt||[],s.pvt||[]);
  document.getElementById('stepInfo').textContent='Passo '+sortStep+'/'+sortSteps.length+': '+s.info;
}

function autoPlay() {
  if(autoInterval){clearInterval(autoInterval);autoInterval=null;return;}
  if(!currentAlgo){setAlgo('bubble');}
  autoInterval=setInterval(()=>{
    if(sortStep>=sortSteps.length){clearInterval(autoInterval);autoInterval=null;return;}
    stepViz();
  },350);
}

function resetViz(){clearInterval(autoInterval);autoInterval=null;initSortViz();}

function genBubble(arr) {
  const n=arr.length;
  for(let i=0;i<n-1;i++){
    for(let j=0;j<n-1-i;j++){
      const srt=[...Array(i).keys()].map(k=>n-1-k);
      sortSteps.push({arr:[...arr],cmp:[j,j+1],srt,info:`Comparando ${arr[j]} e ${arr[j+1]}`});
      if(arr[j]>arr[j+1]){
        [arr[j],arr[j+1]]=[arr[j+1],arr[j]];
        sortSteps.push({arr:[...arr],cmp:[j,j+1],srt,info:`Trocou → ${arr[j]} e ${arr[j+1]}`});
      }
    }
    sortSteps.push({arr:[...arr],cmp:[],srt:[...Array(i+1).keys()].map(k=>n-1-k),info:`${arr[n-1-i]} fixado na posição final`});
  }
}

function genMerge(arr) {
  function mg(a,l,m,r){
    const L=a.slice(l,m+1),R=a.slice(m+1,r+1);let i=0,j=0,k=l;
    while(i<L.length&&j<R.length){
      sortSteps.push({arr:[...a],cmp:[l+i,m+1+j],srt:[],info:`Merge: ${L[i]} vs ${R[j]}`});
      if(L[i]<=R[j])a[k++]=L[i++];else a[k++]=R[j++];
    }
    while(i<L.length)a[k++]=L[i++];
    while(j<R.length)a[k++]=R[j++];
    sortSteps.push({arr:[...a],cmp:[],srt:[],info:`Subarray [${l}..${r}] mergeado`});
  }
  function ms(a,l,r){if(l>=r)return;const m=Math.floor((l+r)/2);ms(a,l,m);ms(a,m+1,r);mg(a,l,m,r);}
  const a=[...arr];ms(a,0,a.length-1);
}

function genQuick(arr,lo,hi) {
  if(lo>=hi)return;
  const pivot=arr[hi];let i=lo-1;
  sortSteps.push({arr:[...arr],cmp:[],pvt:[hi],srt:[],info:`Pivot = ${pivot}`});
  for(let j=lo;j<hi;j++){
    sortSteps.push({arr:[...arr],cmp:[j],pvt:[hi],srt:[],info:`${arr[j]} ≤ ${pivot}?`});
    if(arr[j]<=pivot){i++;[arr[i],arr[j]]=[arr[j],arr[i]];sortSteps.push({arr:[...arr],cmp:[i,j],pvt:[hi],srt:[],info:`Trocou idx ${i} e ${j}`});}
  }
  [arr[i+1],arr[hi]]=[arr[hi],arr[i+1]];
  const pi=i+1;
  sortSteps.push({arr:[...arr],cmp:[],pvt:[],srt:[pi],info:`Pivot ${arr[pi]} na posição final ${pi}`});
  genQuick(arr,lo,pi-1);
  genQuick(arr,pi+1,hi);
}

// ─── BIG O TABLE ────────────────────────────────────────────────────────────
function buildBigO() {
  const el=document.getElementById('bigoRows'); if(!el||el.innerHTML)return;
  const rows=[
    {o:'O(1)',name:'Constante',ex:'arr[i], map.get, hash lookup',color:'#4ade80',n1:1,n1000:1},
    {o:'O(log n)',name:'Logarítmica',ex:'busca binária, BST balanceada',color:'#84cc16',n1:1,n1000:10},
    {o:'O(n)',name:'Linear',ex:'loop simples, busca sequencial',color:'#facc15',n1:1,n1000:1000},
    {o:'O(n log n)',name:'Linearítmica',ex:'merge sort, quick sort médio',color:'#fb923c',n1:1,n1000:10000},
    {o:'O(n²)',name:'Quadrática',ex:'bubble sort, loops aninhados',color:'#ef4444',n1:1,n1000:1000000},
    {o:'O(2ⁿ)',name:'Exponencial',ex:'subsets, fibonacci recursivo',color:'#dc2626',n1:2,n1000:'∞'},
  ];
  const widths=[4,12,35,60,85,100];
  el.innerHTML=rows.map((r,i)=>`
    <div class="cplx-row">
      <span class="cplx-badge" style="background:${r.color}22;color:${r.color};border:1px solid ${r.color}44">${r.o}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--text)">${r.name}</div>
        <div style="font-size:11px;color:var(--text3)">${r.ex}</div>
      </div>
      <div class="cplx-bar-wrap" style="min-width:140px">
        <div class="cplx-bar" style="width:${widths[i]}%;background:${r.color}66"></div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">n=1000 → ${r.n1000.toLocaleString()}</div>
      </div>
    </div>`).join('');
}

// ─── QUIZ FINAL ─────────────────────────────────────────────────────────────
let qAnswers=[];
function buildQuiz() {
  const el=document.getElementById('quizContainer'); if(!el||el.innerHTML)return;
  qAnswers=new Array(quizData.length).fill(null);
  el.innerHTML=quizData.map((q,qi)=>`
    <div class="exercise" id="qq-${qi}">
      <div class="ex-label">Questão ${qi+1} de ${quizData.length}</div>
      <div class="ex-q">${q.q}</div>
      <div class="ex-opts">
        ${q.opts.map((o,oi)=>`<button class="ex-opt" onclick="qAnswer(${qi},${oi},this)">${o}</button>`).join('')}
      </div>
      <div class="ex-feedback" id="qfb-${qi}"></div>
    </div>`).join('');
}

function qAnswer(qi,oi,btn) {
  if(qAnswers[qi]!==null)return;
  qAnswers[qi]=oi;
  const q=quizData[qi];
  document.querySelectorAll(`#qq-${qi} .ex-opt`).forEach((b,i)=>{
    if(i===q.correct)b.classList.add('correct');
    else if(i===oi&&oi!==q.correct)b.classList.add('wrong');
  });
  const fb=document.getElementById('qfb-'+qi);
  fb.textContent=q.explain;
  fb.className='ex-feedback show '+(oi===q.correct?'ok':'ko');
  if(qAnswers.every(a=>a!==null)){
    const score=qAnswers.filter((a,i)=>a===quizData[i].correct).length;
    const res=document.getElementById('quizResult');
    res.style.display='block';
    const pct=Math.round(score/quizData.length*100);
    res.innerHTML=`<div class="completion">
      <div class="score-ring">${score}/${quizData.length}</div>
      <h2>${pct>=88?'🏆 Incrível!':pct>=62?'💪 Muito bom!':pct>=50?'📚 Bom progresso!':'🔄 Continue estudando!'}</h2>
      <p>${score} de ${quizData.length} corretas — ${pct}% de acerto</p>
    </div>`;
    // mark done
    const navItem=document.getElementById('nav-quiz');
    if(navItem)navItem.classList.add('done');
  }
}

// ─── DS VISUALIZER ──────────────────────────────────────────────────────────
function dsHighlight(idx) {
  const cells=document.querySelectorAll('#dsArray .ds-cell');
  cells.forEach((c,i)=>{c.className='ds-cell';if(i===idx)c.classList.add('highlight')});
  document.getElementById('dsInfo').textContent=`Acessando arr[${idx}] → valor ${cells[idx]?.textContent}. Tempo: O(1) — vai direto!`;
}
function dsSearch() {
  const cells=document.querySelectorAll('#dsArray .ds-cell');
  let found=false,steps=0;
  cells.forEach((c,i)=>{
    c.className='ds-cell';
    steps++;
    if(c.textContent==='88'){c.classList.add('found');found=true;}
    else if(!found)c.classList.add('highlight');
  });
  document.getElementById('dsInfo').textContent=`Busca linear por 88: verificou ${steps} elementos. Tempo: O(n).`;
}
function dsReset() {
  const cells=document.querySelectorAll('#dsArray .ds-cell');
  cells.forEach(c=>c.className='ds-cell');
  document.getElementById('dsInfo').textContent='Clique nos botões para ver as operações';
}
